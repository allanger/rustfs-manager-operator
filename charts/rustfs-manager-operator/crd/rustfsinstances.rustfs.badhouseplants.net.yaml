---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rustfsinstances.rustfs.badhouseplants.net
spec:
  group: rustfs.badhouseplants.net
  names:
    categories: []
    kind: RustFSInstance
    plural: rustfsinstances
    shortNames:
      - rustfs
    singular: rustfsinstance
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - description: The URL of the instance
          jsonPath: .spec.endpoint
          name: Endpoint
          type: string
        - description: The region of the instance
          jsonPath: .status.region
          name: Region
          type: string
        - description: How many buckets are there on the instance
          jsonPath: .status.total_buckets
          name: Total Buckets
          type: number
        - description: Is the S3Instance ready
          jsonPath: .status.ready
          name: Status
          type: boolean
      name: v1beta1
      schema:
        openAPIV3Schema:
          description: Connect the operator to a RustFs cluster using this resource
          properties:
            spec:
              properties:
                credentialsSecret:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                    - name
                    - namespace
                  type: object
                endpoint:
                  type: string
              required:
                - credentialsSecret
                - endpoint
              type: object
            status:
              description: The status object of `DbInstance`
              nullable: true
              properties:
                buckets:
                  items:
                    type: string
                  nullable: true
                  type: array
                conditions:
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: message is a human readable message indicating details about the transition. This may be an empty string.
                        type: string
                      observedGeneration:
                        description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                        format: int64
                        type: integer
                      reason:
                        description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                ready:
                  default: false
                  type: boolean
                region:
                  nullable: true
                  type: string
                total_buckets:
                  format: uint
                  minimum: 0.0
                  nullable: true
                  type: integer
              required:
                - conditions
              type: object
          required:
            - spec
          title: RustFSInstance
          type: object
      served: true
      storage: true
      subresources:
        status: {}
